<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390px, initial-scale=1.0">
<title>WineLab — 회원가입</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>* { font-family: 'Noto Sans KR', sans-serif; }</style>
</head>
<body class="bg-gray-200 flex justify-center items-start min-h-screen py-8">

<div class="w-[390px] min-h-[844px] bg-[#FFF8F0] flex flex-col overflow-hidden shadow-2xl rounded-3xl">

  <!-- 상태바 -->
  <div class="bg-[#722f37] h-11 flex items-center justify-between px-5 flex-shrink-0">
    <span class="text-white text-sm font-semibold">9:41</span>
    <div class="w-[17px] h-[10px] border border-white rounded-sm relative">
      <div class="absolute inset-[1.5px] bg-white rounded-sm"></div>
    </div>
  </div>

  <!-- 헤더 -->
  <div class="bg-[#722f37] px-5 pt-4 pb-5 flex items-center gap-3">
    <a href="01-login.html" class="w-8 h-8 rounded-full bg-white/20 flex items-center justify-center text-white text-sm">←</a>
    <h1 class="text-white font-bold text-lg">회원가입</h1>
  </div>

  <!-- 진행 단계 표시 -->
  <div class="bg-white px-5 py-3 flex items-center gap-2 border-b border-[#E8D5C4]">
    <div class="flex items-center gap-1.5">
      <div class="w-6 h-6 rounded-full bg-[#722f37] flex items-center justify-center text-white text-xs font-bold">1</div>
      <span class="text-xs font-semibold text-[#722f37]">계정 생성</span>
    </div>
    <div class="flex-1 h-px bg-[#E8D5C4] mx-1"></div>
    <div class="flex items-center gap-1.5">
      <div class="w-6 h-6 rounded-full bg-[#E8D5C4] flex items-center justify-center text-[#B09090] text-xs font-bold">2</div>
      <span class="text-xs text-[#B09090]">취향 설정</span>
    </div>
  </div>

  <!-- 폼 영역 -->
  <div class="flex-1 px-5 pt-6 pb-8 flex flex-col overflow-y-auto">
    <h2 class="text-[#2a1818] text-xl font-bold mb-1">계정 만들기</h2>
    <p class="text-[#8B6B6B] text-xs mb-6">정보를 입력해 WineLab을 시작하세요</p>

    <!-- 이름 -->
    <div class="mb-4">
      <label class="block text-xs font-semibold text-[#4A3030] mb-1.5">이름</label>
      <input
        type="text"
        placeholder="홍길동"
        class="w-full h-12 px-4 border-[1.5px] border-[#E8D5C4] rounded-xl text-sm bg-white text-[#2a1818] placeholder-[#B09090]"
        style="outline:none;"
      />
    </div>

    <!-- 이메일 -->
    <div class="mb-4">
      <label class="block text-xs font-semibold text-[#4A3030] mb-1.5">이메일</label>
      <input
        type="email"
        placeholder="user@example.com"
        class="w-full h-12 px-4 border-[1.5px] border-[#E8D5C4] rounded-xl text-sm bg-white text-[#2a1818] placeholder-[#B09090]"
        style="outline:none;"
      />
    </div>

    <!-- 비밀번호 -->
    <div class="mb-4">
      <label class="block text-xs font-semibold text-[#4A3030] mb-1.5">비밀번호</label>
      <input
        type="password"
        placeholder="8자 이상 입력"
        class="w-full h-12 px-4 border-[1.5px] border-[#E8D5C4] rounded-xl text-sm bg-white text-[#2a1818] placeholder-[#B09090]"
        style="outline:none;"
      />
      <!-- 비밀번호 강도 바 -->
      <div class="flex gap-1 mt-2">
        <div class="flex-1 h-1 rounded-full bg-[#722f37]"></div>
        <div class="flex-1 h-1 rounded-full bg-[#722f37]"></div>
        <div class="flex-1 h-1 rounded-full bg-[#E8D5C4]"></div>
        <div class="flex-1 h-1 rounded-full bg-[#E8D5C4]"></div>
      </div>
      <p class="text-[10px] text-[#8B6B6B] mt-1">보통 강도</p>
    </div>

    <!-- 비밀번호 확인 -->
    <div class="mb-6">
      <label class="block text-xs font-semibold text-[#4A3030] mb-1.5">비밀번호 확인</label>
      <input
        type="password"
        placeholder="비밀번호 재입력"
        class="w-full h-12 px-4 border-[1.5px] border-[#E8D5C4] rounded-xl text-sm bg-white text-[#2a1818] placeholder-[#B09090]"
        style="outline:none;"
      />
    </div>

    <!-- 약관 동의 (shadcn checkbox 스타일) -->
    <div class="bg-white rounded-xl border border-[#E8D5C4] p-4 mb-6 flex flex-col gap-3">
      <label class="flex items-center gap-3 cursor-pointer">
        <div class="w-5 h-5 rounded border-2 border-[#722f37] bg-[#722f37] flex items-center justify-center flex-shrink-0">
          <svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
        </div>
        <span class="text-xs font-semibold text-[#2a1818]">전체 동의</span>
      </label>
      <div class="h-px bg-[#E8D5C4]"></div>
      <label class="flex items-center gap-3 cursor-pointer">
        <div class="w-5 h-5 rounded border-2 border-[#722f37] bg-[#722f37] flex items-center justify-center flex-shrink-0">
          <svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
        </div>
        <div class="flex items-center justify-between flex-1">
          <span class="text-xs text-[#4A3030]">[필수] 이용약관 동의</span>
          <span class="text-[10px] text-[#722f37] font-medium">보기</span>
        </div>
      </label>
      <label class="flex items-center gap-3 cursor-pointer">
        <div class="w-5 h-5 rounded border-2 border-[#722f37] bg-[#722f37] flex items-center justify-center flex-shrink-0">
          <svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
        </div>
        <div class="flex items-center justify-between flex-1">
          <span class="text-xs text-[#4A3030]">[필수] 개인정보 처리방침 동의</span>
          <span class="text-[10px] text-[#722f37] font-medium">보기</span>
        </div>
      </label>
    </div>

    <!-- 가입 버튼 -->
    <a href="03-onboarding.html">
      <button class="w-full h-12 bg-[#722f37] text-white rounded-xl font-bold text-[15px]" style="box-shadow: 0 4px 14px rgba(114,47,55,0.35);">
        가입하기 →
      </button>
    </a>

    <p class="text-center text-xs text-[#8B6B6B] mt-4">
      이미 계정이 있으신가요?
      <a href="01-login.html" class="text-[#722f37] font-bold ml-1">로그인</a>
    </p>
  </div>

</div>

<div class="fixed bottom-4 left-1/2 -translate-x-1/2 bg-black/80 text-white text-xs px-4 py-2 rounded-full flex gap-3">
  <a href="01-login.html" class="hover:underline">← 01 로그인</a>
  <span>|</span>
  <span class="font-semibold opacity-70">02 회원가입</span>
  <span>|</span>
  <a href="03-onboarding.html" class="hover:underline">03 온보딩 →</a>
</div>

</body>
</html>
