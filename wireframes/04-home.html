<style>

<body class="bg-gray-200 flex justify-center items-start min-h-screen py-8">

  <!-- 상태바 -->

      <input

        placeholder="음식을 검색하거나 선택해보세요"
        class="flex-1 bg-transparent text-white placeholder-white/60 text-sm"
        style="outline:none; border:none;"

    <button class="flex-shrink-0 h-9 px-4 rounded-full text-xs font-semibold bg-[#722f37] text-white border border-[#722f37]">🍚 한식</button>

    </h2>

      <!-- 삼겹살 -->
      <a href="05-recommend.html">

            <span class="text-3xl">🥩</span>
          </div>
          <div class="px-2 py-2 text-center">

        </div>
        <div class="px-2 py-2 text-center">
          <span class="text-[#2a1818] text-[11px] font-bold">김치찌개</span>

      <!-- 불고기 -->

        <div class="h-[78px] bg-[#f9ede4] flex items-center justify-center">
          <span class="text-3xl">🍲</span>
        </div>
        <div class="px-2 py-2 text-center">
          <span class="text-[#2a1818] text-[11px] font-bold">불고기</span>
        </div>
      </div>

      <!-- 해물파전 -->
      <div class="bg-white rounded-2xl border border-[#f0e0d0] overflow-hidden shadow-sm">
        <div class="h-[78px] bg-[#f9ede4] flex items-center justify-center">
          <span class="text-3xl">🦑</span>
        </div>
        <div class="px-2 py-2 text-center">
          <span class="text-[#2a1818] text-[11px] font-bold">해물파전</span>
        </div>
      </div>

      <!-- 된장찌개 -->
      <div class="bg-white rounded-2xl border border-[#f0e0d0] overflow-hidden shadow-sm">
        <div class="h-[78px] bg-[#f9ede4] flex items-center justify-center">
          <span class="text-3xl">🍜</span>
        </div>
        <div class="px-2 py-2 text-center">
          <span class="text-[#2a1818] text-[11px] font-bold">된장찌개</span>
        </div>
      </div>

      <!-- 잡채 -->
      <div class="bg-white rounded-2xl border border-[#f0e0d0] overflow-hidden shadow-sm">
        <div class="h-[78px] bg-[#f9ede4] flex items-center justify-center">
          <span class="text-3xl">🥗</span>
        </div>
        <div class="px-2 py-2 text-center">
          <span class="text-[#2a1818] text-[11px] font-bold">잡채</span>
        </div>
      </div>

      <!-- 찜닭 -->
      <div class="bg-white rounded-2xl border border-[#f0e0d0] overflow-hidden shadow-sm">
        <div class="h-[78px] bg-[#f9ede4] flex items-center justify-center">
          <span class="text-3xl">🍗</span>
        </div>
        <div class="px-2 py-2 text-center">
          <span class="text-[#2a1818] text-[11px] font-bold">찜닭</span>
        </div>
      </div>

      <!-- 계란찜 -->
      <div class="bg-white rounded-2xl border border-[#f0e0d0] overflow-hidden shadow-sm">
        <div class="h-[78px] bg-[#f9ede4] flex items-center justify-center">

        <div class="px-2 py-2 text-center">
          <span class="text-[#2a1818] text-[11px] font-bold">계란찜</span>

    <a href="07-search.html" class="flex-1 flex flex-col items-center gap-1">

    <a href="10-ocr.html" class="flex-1 flex flex-col items-center gap-1">

      <span class="text-[10px] font-medium text-[#B09090]">스캔</span>

    <a href="08-mypage.html" class="flex-1 flex flex-col items-center gap-1">
      <span class="text-xl">👤</span>
      <span class="text-[10px] font-medium text-[#B09090]">마이페이지</span>
