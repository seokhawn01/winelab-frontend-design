<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390px, initial-scale=1.0">
<title>WineLab — 라벨 스캔</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>* { font-family: 'Noto Sans KR', sans-serif; }</style>
</head>
<body class="bg-gray-200 flex justify-center items-start min-h-screen py-8">

<div class="w-[390px] min-h-[844px] bg-[#FFF8F0] flex flex-col overflow-hidden shadow-2xl rounded-3xl relative">

  <!-- 상태바 -->
  <div class="bg-[#722f37] h-11 flex items-center justify-between px-5 flex-shrink-0">
    <span class="text-white text-sm font-semibold">9:41</span>
    <div class="w-[17px] h-[10px] border border-white rounded-sm relative">
      <div class="absolute inset-[1.5px] bg-white rounded-sm"></div>
    </div>
  </div>

  <!-- 헤더 -->
  <div class="bg-[#722f37] px-5 pt-4 pb-5 flex items-center justify-between flex-shrink-0">
    <h1 class="text-white font-bold text-lg">📷 라벨 스캔</h1>
    <span class="text-white/70 text-xs">GPT Vision</span>
  </div>

  <!-- 스크롤 콘텐츠 -->
  <div class="flex-1 overflow-y-auto pb-24">

    <!-- 카메라 뷰파인더 영역 -->
    <div class="mx-4 mt-4">
      <div class="bg-black rounded-2xl overflow-hidden relative" style="height: 260px;">
        <!-- 카메라 뷰 (플레이스홀더) -->
        <div class="absolute inset-0 flex items-center justify-center">
          <div class="text-center">
            <span class="text-white/30 text-6xl block mb-3">📷</span>
            <p class="text-white/50 text-sm">카메라 뷰파인더</p>
          </div>
        </div>
        <!-- 스캔 가이드 오버레이 -->
        <div class="absolute inset-0 flex items-center justify-center">
          <div class="border-2 border-white/50 rounded-xl" style="width: 200px; height: 160px;">
            <!-- 코너 마커 -->
            <div class="absolute top-0 left-0 w-6 h-6 border-t-2 border-l-2 border-white rounded-tl-lg"></div>
            <div class="absolute top-0 right-0 w-6 h-6 border-t-2 border-r-2 border-white rounded-tr-lg"></div>
            <div class="absolute bottom-0 left-0 w-6 h-6 border-b-2 border-l-2 border-white rounded-bl-lg"></div>
            <div class="absolute bottom-0 right-0 w-6 h-6 border-b-2 border-r-2 border-white rounded-br-lg"></div>
          </div>
        </div>
        <!-- 안내 텍스트 -->
        <div class="absolute bottom-3 left-0 right-0 text-center">
          <p class="text-white/70 text-xs">와인 라벨을 프레임 안에 맞춰주세요</p>
        </div>
        <!-- 촬영 버튼 -->
        <div class="absolute bottom-4 left-1/2 -translate-x-1/2">
          <!-- 버튼은 아래에 별도 배치 -->
        </div>
      </div>

      <!-- 촬영 버튼 -->
      <div class="flex justify-center mt-4">
        <button class="w-16 h-16 rounded-full bg-[#722f37] border-4 border-white shadow-lg flex items-center justify-center text-white text-2xl"
          style="box-shadow: 0 4px 14px rgba(114,47,55,0.45);">
          📷
        </button>
      </div>

      <!-- 구분선 -->
      <div class="flex items-center gap-3 my-4">
        <div class="flex-1 h-px bg-[#E8D5C4]"></div>
        <span class="text-xs text-[#B09090] font-medium">또는</span>
        <div class="flex-1 h-px bg-[#E8D5C4]"></div>
      </div>

      <!-- 갤러리 버튼 (shadcn outline button) -->
      <button class="w-full h-12 bg-white border-[1.5px] border-[#E8D5C4] rounded-xl text-sm font-medium text-[#4A3030] flex items-center justify-center gap-2">
        <span class="text-base">🖼️</span>
        갤러리에서 불러오기
      </button>
    </div>

    <!-- 인식 결과 (촬영 후 표시) -->
    <div class="mx-4 mt-5">
      <div class="flex items-center gap-2 mb-3">
        <div class="w-5 h-5 rounded-full bg-green-500 flex items-center justify-center">
          <svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
        </div>
        <h3 class="text-sm font-bold text-[#2a1818]">인식된 와인 정보</h3>
        <span class="ml-auto text-[10px] text-green-600 font-semibold bg-green-50 px-2 py-0.5 rounded-full border border-green-200">신뢰도 92%</span>
      </div>

      <!-- 결과 카드 (shadcn card) -->
      <div class="bg-white rounded-2xl border border-[#E8D5C4] shadow-sm overflow-hidden">
        <div class="p-4">
          <div class="flex items-start gap-3 mb-4">
            <div class="w-[60px] h-[80px] bg-[#f0e0d0] rounded-xl flex items-center justify-center flex-shrink-0 border border-[#E8D5C4]">
              <span class="text-3xl">🍷</span>
            </div>
            <div class="flex-1">
              <span class="text-[10px] bg-[#f0e0d0] text-[#722f37] px-2 py-0.5 rounded-full font-bold">레드 와인</span>
              <p class="text-[#2a1818] font-bold text-base mt-1 leading-tight">까베르네 소비뇽 2021</p>
              <p class="text-[#8B6B6B] text-xs mt-0.5">나파 밸리, 캘리포니아</p>
              <p class="text-[10px] text-[#B09090] mt-1">빈티지: 2021 · 까베르네 소비뇽</p>
            </div>
          </div>

          <!-- 맛 속성 바 (컴팩트) -->
          <div class="grid grid-cols-2 gap-2.5">
            <div>
              <div class="flex justify-between text-[10px] mb-1">
                <span class="text-[#8B6B6B]">탄닌</span>
                <span class="text-[#722f37] font-bold">4.0</span>
              </div>
              <div class="h-1.5 bg-[#f0e0d0] rounded-full overflow-hidden">
                <div class="h-full bg-[#722f37] rounded-full" style="width:80%"></div>
              </div>
            </div>
            <div>
              <div class="flex justify-between text-[10px] mb-1">
                <span class="text-[#8B6B6B]">산미</span>
                <span class="text-[#722f37] font-bold">3.5</span>
              </div>
              <div class="h-1.5 bg-[#f0e0d0] rounded-full overflow-hidden">
                <div class="h-full bg-[#722f37] rounded-full" style="width:70%"></div>
              </div>
            </div>
            <div>
              <div class="flex justify-between text-[10px] mb-1">
                <span class="text-[#8B6B6B]">바디감</span>
                <span class="text-[#722f37] font-bold">4.0</span>
              </div>
              <div class="h-1.5 bg-[#f0e0d0] rounded-full overflow-hidden">
                <div class="h-full bg-[#722f37] rounded-full" style="width:80%"></div>
              </div>
            </div>
            <div>
              <div class="flex justify-between text-[10px] mb-1">
                <span class="text-[#8B6B6B]">당도</span>
                <span class="text-[#722f37] font-bold">2.0</span>
              </div>
              <div class="h-1.5 bg-[#f0e0d0] rounded-full overflow-hidden">
                <div class="h-full bg-[#722f37] rounded-full" style="width:40%"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- 액션 버튼 -->
        <div class="px-4 pb-4 flex flex-col gap-2.5">
          <button class="w-full h-11 bg-[#722f37] text-white rounded-xl text-sm font-bold"
            style="box-shadow: 0 4px 12px rgba(114,47,55,0.3);">
            내 컬렉션에 추가
          </button>
          <a href="06-wine-detail.html">
            <button class="w-full h-11 bg-white border-[1.5px] border-[#722f37] text-[#722f37] rounded-xl text-sm font-bold">
              와인 상세 보기 →
            </button>
          </a>
        </div>
      </div>

      <!-- 실패 케이스 안내 (별도 상태로 표시) -->
      <div class="mt-3 bg-amber-50 border border-amber-200 rounded-xl p-3 flex items-start gap-2">
        <span class="text-amber-500 text-base flex-shrink-0">⚠️</span>
        <div>
          <p class="text-xs font-semibold text-amber-700">인식이 불확실한 경우</p>
          <p class="text-[11px] text-amber-600 mt-0.5">정보가 정확하지 않을 수 있어요. 직접 검색해서 확인해보세요.</p>
          <a href="07-search.html">
            <button class="mt-2 px-3 py-1.5 bg-amber-100 border border-amber-300 rounded-lg text-[11px] font-semibold text-amber-700">
              와인 검색하기 →
            </button>
          </a>
        </div>
      </div>

    </div>

  </div>

  <!-- 하단 네비 -->
  <nav class="absolute bottom-0 left-0 right-0 bg-white border-t border-[#E8D5C4] h-[72px] flex items-start pt-2.5">
    <a href="04-home.html" class="flex-1 flex flex-col items-center gap-1">
      <span class="text-xl">🏠</span>
      <span class="text-[10px] font-medium text-[#B09090]">홈</span>
    </a>
    <a href="07-search.html" class="flex-1 flex flex-col items-center gap-1">
      <span class="text-xl">🔍</span>
      <span class="text-[10px] font-medium text-[#B09090]">검색</span>
    </a>
    <a href="10-ocr.html" class="flex-1 flex flex-col items-center gap-1">
      <span class="text-xl">📷</span>
      <span class="text-[10px] font-bold text-[#722f37]">스캔</span>
    </a>
    <a href="08-mypage.html" class="flex-1 flex flex-col items-center gap-1">
      <span class="text-xl">👤</span>
      <span class="text-[10px] font-medium text-[#B09090]">마이페이지</span>
    </a>
  </nav>

</div>

<div class="fixed bottom-4 left-1/2 -translate-x-1/2 bg-black/80 text-white text-xs px-4 py-2 rounded-full flex gap-3">
  <a href="09-review.html" class="hover:underline">← 09 리뷰</a>
  <span>|</span>
  <span class="font-semibold opacity-70">10 스캔</span>
  <span>|</span>
  <a href="01-login.html" class="hover:underline">처음으로 ↩</a>
</div>

</body>
</html>
