<body class="bg-gray-200 flex justify-center items-start min-h-screen py-8">

<div class="w-[390px] min-h-[844px] bg-[#FFF8F0] flex flex-col overflow-hidden shadow-2xl rounded-3xl relative">

  <!-- 상태바 -->

          <!-- 버튼은 아래에 별도 배치 -->
        </div>
      </div>

      <!-- 촬영 버튼 -->
      <div class="flex justify-center mt-4">
        <button class="w-16 h-16 rounded-full bg-[#722f37] border-4 border-white shadow-lg flex items-center justify-center text-white text-2xl"

        </button>
      </div>

      <!-- 구분선 -->
      <div class="flex items-center gap-3 my-4">
        <div class="flex-1 h-px bg-[#E8D5C4]"></div>
        <span class="text-xs text-[#B09090] font-medium">또는</span>

            <div>
