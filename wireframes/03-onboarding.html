<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390px, initial-scale=1.0">
<title>WineLab — 취향 설정</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { font-family: 'Noto Sans KR', sans-serif; }
input[type="range"] {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  height: 6px;
  border-radius: 9999px;
  background: linear-gradient(to right, #722f37 0%, #722f37 50%, #E8D5C4 50%, #E8D5C4 100%);
  outline: none;
  cursor: pointer;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: #722f37;
  border: 2px solid white;
  box-shadow: 0 2px 6px rgba(114,47,55,0.4);
  cursor: pointer;
}
</style>
</head>
<body class="bg-gray-200 flex justify-center items-start min-h-screen py-8">

<div class="w-[390px] min-h-[844px] bg-[#FFF8F0] flex flex-col overflow-hidden shadow-2xl rounded-3xl">

  <!-- 상태바 -->
  <div class="bg-[#722f37] h-11 flex items-center justify-between px-5 flex-shrink-0">
    <span class="text-white text-sm font-semibold">9:41</span>
    <div class="w-[17px] h-[10px] border border-white rounded-sm relative">
      <div class="absolute inset-[1.5px] bg-white rounded-sm"></div>
    </div>
  </div>

  <!-- 헤더 -->
  <div class="bg-[#722f37] px-5 pt-4 pb-5 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <h1 class="text-white text-lg tracking-wide">
        <span class="font-light">wine</span><span class="font-semibold">lab</span>
      </h1>
    </div>
    <span class="text-white/70 text-sm">취향 설정</span>
  </div>

  <!-- 안내 문구 -->
  <div class="px-5 pt-5 pb-3">
    <h2 class="text-[#2a1818] text-xl font-bold mb-1">어떤 와인을 좋아하세요?</h2>
    <p class="text-[#8B6B6B] text-xs leading-relaxed">슬라이더로 취향을 설정하거나<br>아직 잘 모른다면 건너뛸 수 있어요</p>
  </div>

  <!-- 취향 미리보기 + 슬라이더 -->
  <div class="px-4 pb-4 flex-1 flex flex-col gap-3 overflow-y-auto">

    <!-- 취향 미리보기 카드 (레이더 차트 대체) -->
    <div class="bg-white rounded-2xl border border-[#E8D5C4] p-4 shadow-sm flex-shrink-0">
      <p class="text-xs font-bold text-[#2a1818] mb-3">현재 취향 미리보기</p>
      <div class="flex gap-3">
        <!-- 탄닌 -->
        <div class="flex-1 flex flex-col items-center gap-1.5">
          <span class="text-xl leading-none">🍇</span>
          <div class="w-full h-2 bg-[#f0e0d0] rounded-full overflow-hidden">
            <div class="h-full bg-[#722f37] rounded-full" style="width:50%"></div>
          </div>
          <span class="text-[10px] font-bold text-[#722f37]">2.5</span>
          <span class="text-[9px] text-[#B09090]">탄닌</span>
        </div>
        <!-- 산미 -->
        <div class="flex-1 flex flex-col items-center gap-1.5">
          <span class="text-xl leading-none">🍋</span>
          <div class="w-full h-2 bg-[#f0e0d0] rounded-full overflow-hidden">
            <div class="h-full bg-[#722f37] rounded-full" style="width:60%"></div>
          </div>
          <span class="text-[10px] font-bold text-[#722f37]">3.0</span>
          <span class="text-[9px] text-[#B09090]">산미</span>
        </div>
        <!-- 바디감 -->
        <div class="flex-1 flex flex-col items-center gap-1.5">
          <span class="text-xl leading-none">⚖️</span>
          <div class="w-full h-2 bg-[#f0e0d0] rounded-full overflow-hidden">
            <div class="h-full bg-[#722f37] rounded-full" style="width:70%"></div>
          </div>
          <span class="text-[10px] font-bold text-[#722f37]">3.5</span>
          <span class="text-[9px] text-[#B09090]">바디감</span>
        </div>
        <!-- 당도 -->
        <div class="flex-1 flex flex-col items-center gap-1.5">
          <span class="text-xl leading-none">🍯</span>
          <div class="w-full h-2 bg-[#f0e0d0] rounded-full overflow-hidden">
            <div class="h-full bg-[#722f37] rounded-full" style="width:30%"></div>
          </div>
          <span class="text-[10px] font-bold text-[#722f37]">1.5</span>
          <span class="text-[9px] text-[#B09090]">당도</span>
        </div>
      </div>
    </div>

    <!-- 탄닌 슬라이더 -->
    <div class="bg-white rounded-2xl border border-[#E8D5C4] p-4 shadow-sm">
      <div class="flex items-center justify-between mb-3">
        <div class="flex items-center gap-2">
          <span class="text-lg">🍇</span>
          <span class="text-sm font-bold text-[#2a1818]">탄닌</span>
        </div>
        <span class="text-sm font-bold text-[#722f37] bg-[#722f37]/10 px-2.5 py-0.5 rounded-full">2.5</span>
      </div>
      <input type="range" min="0" max="5" step="0.1" value="2.5"
        style="background: linear-gradient(to right, #722f37 50%, #E8D5C4 50%);"
      />
      <div class="flex justify-between mt-1.5">
        <span class="text-xs text-[#B09090]">부드러움</span>
        <span class="text-xs text-[#B09090]">강함</span>
      </div>
    </div>

    <!-- 산미 슬라이더 -->
    <div class="bg-white rounded-2xl border border-[#E8D5C4] p-4 shadow-sm">
      <div class="flex items-center justify-between mb-3">
        <div class="flex items-center gap-2">
          <span class="text-lg">🍋</span>
          <span class="text-sm font-bold text-[#2a1818]">산미</span>
        </div>
        <span class="text-sm font-bold text-[#722f37] bg-[#722f37]/10 px-2.5 py-0.5 rounded-full">3.0</span>
      </div>
      <input type="range" min="0" max="5" step="0.1" value="3.0"
        style="background: linear-gradient(to right, #722f37 60%, #E8D5C4 60%);"
      />
      <div class="flex justify-between mt-1.5">
        <span class="text-xs text-[#B09090]">낮음</span>
        <span class="text-xs text-[#B09090]">높음</span>
      </div>
    </div>

    <!-- 바디감 슬라이더 -->
    <div class="bg-white rounded-2xl border border-[#E8D5C4] p-4 shadow-sm">
      <div class="flex items-center justify-between mb-3">
        <div class="flex items-center gap-2">
          <span class="text-lg">⚖️</span>
          <span class="text-sm font-bold text-[#2a1818]">바디감</span>
        </div>
        <span class="text-sm font-bold text-[#722f37] bg-[#722f37]/10 px-2.5 py-0.5 rounded-full">3.5</span>
      </div>
      <input type="range" min="0" max="5" step="0.1" value="3.5"
        style="background: linear-gradient(to right, #722f37 70%, #E8D5C4 70%);"
      />
      <div class="flex justify-between mt-1.5">
        <span class="text-xs text-[#B09090]">가벼움</span>
        <span class="text-xs text-[#B09090]">묵직함</span>
      </div>
    </div>

    <!-- 당도 슬라이더 -->
    <div class="bg-white rounded-2xl border border-[#E8D5C4] p-4 shadow-sm">
      <div class="flex items-center justify-between mb-3">
        <div class="flex items-center gap-2">
          <span class="text-lg">🍯</span>
          <span class="text-sm font-bold text-[#2a1818]">당도</span>
        </div>
        <span class="text-sm font-bold text-[#722f37] bg-[#722f37]/10 px-2.5 py-0.5 rounded-full">1.5</span>
      </div>
      <input type="range" min="0" max="5" step="0.1" value="1.5"
        style="background: linear-gradient(to right, #722f37 30%, #E8D5C4 30%);"
      />
      <div class="flex justify-between mt-1.5">
        <span class="text-xs text-[#B09090]">드라이</span>
        <span class="text-xs text-[#B09090]">달콤함</span>
      </div>
    </div>

  </div>

  <!-- 하단 버튼 영역 -->
  <div class="px-5 pb-8 flex flex-col gap-3 flex-shrink-0">
    <a href="04-home.html">
      <button class="w-full h-12 bg-[#722f37] text-white rounded-xl font-bold text-[15px]"
        style="box-shadow: 0 4px 14px rgba(114,47,55,0.35);">
        시작하기 →
      </button>
    </a>
    <a href="04-home.html">
      <button class="w-full h-12 bg-white border border-[#E8D5C4] text-[#8B6B6B] rounded-xl font-medium text-sm">
        잘 모르겠어요 — 건너뛰기
      </button>
    </a>
  </div>

</div>

<div class="fixed bottom-4 left-1/2 -translate-x-1/2 bg-black/80 text-white text-xs px-4 py-2 rounded-full flex gap-3">
  <a href="02-signup.html" class="hover:underline">← 02 회원가입</a>
  <span>|</span>
  <span class="font-semibold opacity-70">03 온보딩</span>
  <span>|</span>
  <a href="04-home.html" class="hover:underline">04 홈 →</a>
</div>

</body>
</html>
