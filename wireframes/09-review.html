<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390px, initial-scale=1.0">
<title>WineLab — 리뷰 작성</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { font-family: 'Noto Sans KR', sans-serif; }
.star-btn {
  width: 44px; height: 44px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%; border: 2px solid #E8D5C4;
  font-size: 16px; font-weight: 700; color: #B09090;
  background: white; cursor: pointer; transition: all 0.15s;
}
.star-btn.active {
  background: #722f37; border-color: #722f37; color: white;
}
.reason-btn {
  padding: 8px 14px;
  border-radius: 12px; border: 1.5px solid #E8D5C4;
  font-size: 12px; font-weight: 500; color: #4A3030;
  background: white; cursor: pointer;
}
.reason-btn.selected {
  background: #722f37; border-color: #722f37; color: white; font-weight: 700;
}
textarea { resize: none; }
</style>
</head>
<body class="bg-gray-200 flex justify-center items-start min-h-screen py-8">

<div class="w-[390px] min-h-[844px] bg-[#FFF8F0] flex flex-col overflow-hidden shadow-2xl rounded-3xl">

  <!-- 상태바 -->
  <div class="bg-[#722f37] h-11 flex items-center justify-between px-5 flex-shrink-0">
    <span class="text-white text-sm font-semibold">9:41</span>
    <div class="w-[17px] h-[10px] border border-white rounded-sm relative">
      <div class="absolute inset-[1.5px] bg-white rounded-sm"></div>
    </div>
  </div>

  <!-- 헤더 -->
  <div class="bg-[#722f37] px-5 pt-4 pb-5 flex items-center gap-3 flex-shrink-0">
    <a href="08-mypage.html" class="w-8 h-8 rounded-full bg-white/20 flex items-center justify-center text-white text-sm">←</a>
    <h1 class="text-white font-bold text-lg">리뷰 작성</h1>
  </div>

  <!-- 와인 정보 요약 -->
  <div class="bg-white px-5 py-4 border-b border-[#E8D5C4] flex items-center gap-3 flex-shrink-0">
    <div class="w-[44px] h-[60px] bg-[#f0e0d0] rounded-xl flex items-center justify-center flex-shrink-0">
      <span class="text-2xl">🍷</span>
    </div>
    <div>
      <p class="text-[#2a1818] font-bold text-sm">까베르네 소비뇽 2021</p>
      <p class="text-[#8B6B6B] text-[11px] mt-0.5">2026년 3월 22일 · 나파 밸리</p>
    </div>
  </div>

  <!-- 스크롤 폼 영역 -->
  <div class="flex-1 overflow-y-auto px-4 pt-4 pb-8 flex flex-col gap-4">

    <!-- 탄닌 별점 -->
    <div class="bg-white rounded-2xl border border-[#E8D5C4] shadow-sm p-4">
      <h3 class="text-sm font-bold text-[#2a1818] mb-3 flex items-center gap-1.5">
        <span>🍇</span> 탄닌은 어땠나요?
      </h3>
      <!-- 별점 버튼 -->
      <div class="flex gap-2 justify-center mb-3">
        <button class="star-btn">1</button>
        <button class="star-btn active">2</button>
        <button class="star-btn">3</button>
        <button class="star-btn">4</button>
        <button class="star-btn">5</button>
      </div>
      <!-- 저점수 이유 (1~2점 선택 시 노출) -->
      <div class="bg-[#FFF8F0] rounded-xl p-3 border border-[#E8D5C4]">
        <p class="text-[11px] text-[#8B6B6B] mb-2 font-medium">어떤 점이 아쉬웠나요?</p>
        <div class="flex gap-2 flex-wrap">
          <button class="reason-btn selected">탄닌이 너무 강해요</button>
          <button class="reason-btn">탄닌이 너무 약해요</button>
        </div>
      </div>
    </div>

    <!-- 산미 별점 -->
    <div class="bg-white rounded-2xl border border-[#E8D5C4] shadow-sm p-4">
      <h3 class="text-sm font-bold text-[#2a1818] mb-3 flex items-center gap-1.5">
        <span>🍋</span> 산미는 어땠나요?
      </h3>
      <div class="flex gap-2 justify-center">
        <button class="star-btn">1</button>
        <button class="star-btn">2</button>
        <button class="star-btn active">3</button>
        <button class="star-btn">4</button>
        <button class="star-btn">5</button>
      </div>
    </div>

    <!-- 바디감 별점 -->
    <div class="bg-white rounded-2xl border border-[#E8D5C4] shadow-sm p-4">
      <h3 class="text-sm font-bold text-[#2a1818] mb-3 flex items-center gap-1.5">
        <span>⚖️</span> 바디감은 어땠나요?
      </h3>
      <div class="flex gap-2 justify-center">
        <button class="star-btn">1</button>
        <button class="star-btn">2</button>
        <button class="star-btn">3</button>
        <button class="star-btn active">4</button>
        <button class="star-btn">5</button>
      </div>
    </div>

    <!-- 당도 별점 -->
    <div class="bg-white rounded-2xl border border-[#E8D5C4] shadow-sm p-4">
      <h3 class="text-sm font-bold text-[#2a1818] mb-3 flex items-center gap-1.5">
        <span>🍯</span> 당도는 어땠나요?
      </h3>
      <div class="flex gap-2 justify-center">
        <button class="star-btn">1</button>
        <button class="star-btn">2</button>
        <button class="star-btn active">3</button>
        <button class="star-btn">4</button>
        <button class="star-btn">5</button>
      </div>
    </div>

    <!-- 테이스팅 노트 (shadcn textarea 스타일) -->
    <div class="bg-white rounded-2xl border border-[#E8D5C4] shadow-sm overflow-hidden">
      <!-- 노트 헤더 (일기 스타일) -->
      <div class="px-4 py-3 border-b border-[#E8D5C4] flex items-center gap-2">
        <span class="text-base">🗒️</span>
        <div>
          <p class="text-xs font-bold text-[#2a1818]">테이스팅 노트</p>
          <p class="text-[10px] text-[#8B6B6B]">선택 사항</p>
        </div>
      </div>
      <!-- 날짜 헤더 -->
      <div class="px-4 pt-3 pb-1">
        <p class="text-[11px] font-bold text-[#722f37]">📅 2026년 3월 22일</p>
        <div class="h-px bg-[#E8D5C4] mt-2"></div>
      </div>
      <!-- 텍스트 에리어 -->
      <textarea
        rows="5"
        placeholder="오늘 이 와인은...&#10;(어떤 음식과 함께였나요? 어떤 향이 느껴졌나요? 특별한 순간이었나요?)"
        class="w-full px-4 py-3 text-sm text-[#2a1818] placeholder-[#B09090] leading-relaxed"
        style="outline:none; border:none; background:transparent; font-family: 'Noto Sans KR', sans-serif;"
      ></textarea>
    </div>

    <!-- 저장 버튼 -->
    <button class="w-full h-12 bg-[#722f37] text-white rounded-xl font-bold text-[15px] mt-1"
      style="box-shadow: 0 4px 14px rgba(114,47,55,0.35);">
      저장하고 취향 업데이트
    </button>
    <p class="text-center text-[10px] text-[#B09090] -mt-2">리뷰 저장 시 취향 프로파일이 자동 업데이트됩니다</p>

  </div>

</div>

<div class="fixed bottom-4 left-1/2 -translate-x-1/2 bg-black/80 text-white text-xs px-4 py-2 rounded-full flex gap-3">
  <a href="08-mypage.html" class="hover:underline">← 08 마이페이지</a>
  <span>|</span>
  <span class="font-semibold opacity-70">09 리뷰</span>
  <span>|</span>
  <a href="10-ocr.html" class="hover:underline">10 스캔 →</a>
</div>

</body>
</html>
