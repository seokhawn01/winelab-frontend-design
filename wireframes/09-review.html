* { font-family: 'Noto Sans KR', sans-serif; }
.star-btn {

  font-size: 16px; font-weight: 700; color: #B09090;
  background: white; cursor: pointer; transition: all 0.15s;
}
.star-btn.active {

}
.star-btn.low-active {
  background: #e53e3e; border-color: #e53e3e; color: white;
}
.reason-btn {

}
textarea { resize: none; }

/* 모달 오버레이 */
.modal-overlay {

  background: rgba(0,0,0,0.5);
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
  opacity: 0; pointer-events: none;
  transition: opacity 0.2s;
}
.modal-overlay.open {

}
.modal-box {
  width: 320px;
  background: white; border-radius: 20px;
  padding: 24px 20px;
  transform: translateY(20px);
  transition: transform 0.2s;
}
.modal-overlay.open .modal-box {
  transform: translateY(0);
}

<script>
// 현재 모달에 연결된 정보
let currentMetric = null;
let currentReasons = [];
let currentInlineId = null;
let selectedReason = null;

// 별점 선택 함수
function selectStar(metric, score, clickedBtn, emoji, title, reasons) {
  const container = clickedBtn.parentElement;
  const buttons = container.querySelectorAll('.star-btn');

  // 별점 버튼 상태 업데이트 — 선택한 버튼 하나만 활성화
  buttons.forEach((btn, idx) => {
    btn.classList.remove('active', 'low-active');
    if (idx + 1 === score) {
      if (score <= 2) {
        btn.classList.add('active', 'low-active');
      } else {
        btn.classList.add('active');
      }
    }
  });

  // 2점 이하일 때 모달 열기
  if (score <= 2) {
    currentMetric = metric;
    currentReasons = reasons;
    currentInlineId = 'inline-' + metric;
    selectedReason = null;

    // 모달 내용 설정
    document.getElementById('modalEmoji').textContent = emoji;
    document.getElementById('modalTitle').textContent = title;

    // 이유 버튼 생성
    const reasonsContainer = document.getElementById('modalReasons');
    reasonsContainer.innerHTML = '';
    reasons.forEach(reason => {
      const btn = document.createElement('button');
      btn.className = 'reason-btn';
      btn.textContent = reason;
      btn.onclick = () => selectReason(btn, reason);
      reasonsContainer.appendChild(btn);
    });

    // 모달 열기
    document.getElementById('lowScoreModal').classList.add('open');
  } else {
    // 3점 이상이면 인라인 이유 영역 숨기기
    const inlineEl = document.getElementById('inline-' + metric);
    if (inlineEl) inlineEl.style.display = 'none';
  }
}

// 이유 선택 함수
function selectReason(btn, reason) {
  document.querySelectorAll('#modalReasons .reason-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedReason = reason;
}

// 모달 닫기
function closeModal() {
  document.getElementById('lowScoreModal').classList.remove('open');
}

// 모달 확인 — 인라인 영역에 선택 결과 반영
function confirmModal() {
  if (currentInlineId) {
    const inlineEl = document.getElementById(currentInlineId);
    if (inlineEl) {
      if (selectedReason) {
        inlineEl.style.display = 'block';
        inlineEl.querySelector('.flex').innerHTML =
          `<span class="text-[11px] bg-[#f0e0d0] text-[#722f37] px-2.5 py-1 rounded-full font-semibold">${selectedReason}</span>`;
      } else {
        inlineEl.style.display = 'none';
      }
    }
  }
  closeModal();
}

// 초기 상태: 탄닌 인라인 표시 (2점 선택된 초기 상태 반영)
document.addEventListener('DOMContentLoaded', () => {
  const inlineTannin = document.getElementById('inline-tannin');
  if (inlineTannin) inlineTannin.style.display = 'block';

  // 나머지 metric 인라인 숨기기
  ['acidity', 'body', 'sweet'].forEach(m => {
    const el = document.getElementById('inline-' + m);
    if (el) el.style.display = 'none';
  });
});

// 모달 외부 클릭 시 닫기
document.getElementById('lowScoreModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
</script>
