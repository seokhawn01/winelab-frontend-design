<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390px, initial-scale=1.0">
<title>WineLab — 로그인</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          burgundy: '#722f37',
          cream: '#FFF8F0',
          gold: '#C5A028',
        }
      }
    }
  }
</script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>* { font-family: 'Noto Sans KR', sans-serif; }</style>
</head>
<body class="bg-gray-200 flex justify-center items-start min-h-screen py-8">

<div class="w-[390px] min-h-[844px] bg-[#FFF8F0] flex flex-col overflow-hidden shadow-2xl rounded-3xl">

  <!-- 상태바 -->
  <div class="bg-[#722f37] h-11 flex items-center justify-between px-5 flex-shrink-0">
    <span class="text-white text-sm font-semibold">9:41</span>
    <div class="flex items-center gap-1">
      <div class="w-[17px] h-[10px] border border-white rounded-sm relative">
        <div class="absolute inset-[1.5px] bg-white rounded-sm"></div>
      </div>
    </div>
  </div>

  <!-- 브랜드 헤더 -->
  <div class="bg-[#722f37] px-6 pt-10 pb-12 flex flex-col items-center text-center flex-shrink-0">
<h1 class="text-white text-3xl tracking-wide mt-1">
      <span class="font-light">wine</span><span class="font-semibold">lab</span>
    </h1>
    <p class="text-white/70 text-sm mt-2">AI가 추천하는 음식과 와인 페어링</p>
    <div class="flex flex-col gap-2 mt-6 w-full text-left">
      <div class="flex items-center gap-2 text-white/80 text-xs">
        <span class="w-4 h-4 rounded-full bg-white/30 flex items-center justify-center text-[10px]">✓</span>
        음식 선택 → AI 와인 추천
      </div>
      <div class="flex items-center gap-2 text-white/80 text-xs">
        <span class="w-4 h-4 rounded-full bg-white/30 flex items-center justify-center text-[10px]">✓</span>
        리뷰로 나만의 취향 학습
      </div>
      <div class="flex items-center gap-2 text-white/80 text-xs">
        <span class="w-4 h-4 rounded-full bg-white/30 flex items-center justify-center text-[10px]">✓</span>
        내 와인 컬렉션 관리
      </div>
    </div>
  </div>

  <!-- 폼 영역 -->
  <div class="flex-1 px-5 pt-6 pb-8 flex flex-col">
    <h2 class="text-[#2a1818] text-xl font-bold mb-1">로그인</h2>
    <p class="text-[#8B6B6B] text-xs mb-6">계속하려면 로그인하세요</p>

    <!-- 이메일 -->
    <div class="mb-4">
      <label class="block text-xs font-semibold text-[#4A3030] mb-1.5">이메일</label>
      <input
        type="email"
        placeholder="user@example.com"
        class="w-full h-12 px-4 border-[1.5px] border-[#E8D5C4] rounded-xl text-sm bg-white text-[#2a1818] placeholder-[#B09090]"
        style="outline:none;"
      />
    </div>

    <!-- 비밀번호 -->
    <div class="mb-5">
      <label class="block text-xs font-semibold text-[#4A3030] mb-1.5">비밀번호</label>
      <div class="relative">
        <input
          type="password"
          placeholder="••••••••"
          class="w-full h-12 px-4 border-[1.5px] border-[#E8D5C4] rounded-xl text-sm bg-white text-[#2a1818] placeholder-[#B09090]"
          style="outline:none;"
        />
        <button class="absolute right-3 top-1/2 -translate-y-1/2 text-[#B09090] text-xs font-medium">보기</button>
      </div>
      <div class="flex justify-end mt-1.5">
        <button class="text-xs text-[#722f37] font-semibold">비밀번호를 잊으셨나요?</button>
      </div>
    </div>

    <!-- 로그인 버튼 (shadcn primary) -->
    <button class="w-full h-12 bg-[#722f37] text-white rounded-xl font-bold text-[15px] shadow-md" style="box-shadow: 0 4px 14px rgba(114,47,55,0.35);">
      로그인
    </button>

    <!-- 구분선 -->
    <div class="flex items-center gap-3 my-5">
      <div class="flex-1 h-px bg-[#E8D5C4]"></div>
      <span class="text-xs text-[#B09090] font-medium">또는</span>
      <div class="flex-1 h-px bg-[#E8D5C4]"></div>
    </div>

    <!-- 회원가입 링크 -->
    <p class="text-center text-xs text-[#8B6B6B]">
      계정이 없으신가요?
      <a href="02-signup.html" class="text-[#722f37] font-bold ml-1">회원가입</a>
    </p>
  </div>

</div>

<!-- 페이지 네비 (와이어프레임 전용) -->
<div class="fixed bottom-4 left-1/2 -translate-x-1/2 bg-black/80 text-white text-xs px-4 py-2 rounded-full flex gap-3">
  <span class="font-semibold opacity-70">01 로그인</span>
  <span>|</span>
  <a href="02-signup.html" class="hover:underline">02 회원가입 →</a>
</div>

</body>
</html>
